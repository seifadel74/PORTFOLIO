<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="main.css">
    <link rel="icon"  href="src/logo.png">
    <title>contact</title>
</head>
<body class="text-white">
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">SHO3LA</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                    <a class="nav-link active"  href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <form class="w-100" style="max-width: 500px;">
            <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="exampleFormControlInput1" placeholder="John Doe">
            </div>
            <div class="mb-3">
                <label for="exampleFormControlInput2" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="exampleFormControlInput2" placeholder="(123) 456-7890">
            </div>
            <div class="mb-3">
                <label for="exampleFormControlInput3" class="form-label">Email address</label>
                <input type="email" class="form-control" id="exampleFormControlInput3" placeholder="name@example.com">
            </div>
            <div class="mb-3">
                <label for="formFile" class="form-label">Default file input example</label>
                <input class="form-control" type="file" id="formFile">
            </div>
            <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">Message</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="6"></textarea>
            </div>
            <button type="button" class="btn btn-primary" id="liveToastBtn">Submit</button>
        </form>

        <div class="toast-container position-fixed top-0 end-0 p-3">
            <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="false">
                <div class="toast-header">
                    <img src="..." class="rounded me-2" alt="...">
                    <strong class="me-auto">Bootstrap</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
                <div class="toast-body">
                    Form Sent Successfully!
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer text-white">
        <p class="footer-copy mb-2">© 2026 SHO3LA. All Rights Reserved.</p>
        <div class="footer-links">
            <a href="https://www.linkedin.com/in/seifallah-adel-104b0830b/" target="_blank" rel="noreferrer noopener">LinkedIn</a>
            <a href="https://www.facebook.com/seaf.adel.10" target="_blank" rel="noreferrer noopener">Facebook</a>
            <a href="https://github.com/seifadel74" target="_blank" rel="noreferrer noopener">GitHub</a>
        </div>
    </footer>
</body>
</html>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
<script>
  const toastTrigger = document.getElementById('liveToastBtn');
  const toastLiveExample = document.getElementById('liveToast');
  if (toastTrigger && toastLiveExample) {
    const toast = new bootstrap.Toast(toastLiveExample);
    toastTrigger.addEventListener('click', () => toast.show());
  }
</script>
